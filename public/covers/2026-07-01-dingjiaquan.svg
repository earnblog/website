<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:供需天平中间的价格">
  <rect width="680" height="300" fill="#1c2330"/>
  <!-- 立柱 -->
  <line x1="340" y1="70" x2="340" y2="240" stroke="#5b6b85" stroke-width="3"/>
  <rect x="300" y="240" width="80" height="10" rx="3" fill="#5b6b85"/>
  <!-- 横梁 -->
  <line x1="170" y1="96" x2="510" y2="96" stroke="#c8a96a" stroke-width="4" stroke-linecap="round"/>
  <!-- 价格(支点) -->
  <circle cx="340" cy="96" r="12" fill="#c8a96a"/>
  <text x="340" y="62" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="15" font-weight="700" fill="#e3c587">价格</text>
  <!-- 左盘:供 -->
  <line x1="170" y1="96" x2="170" y2="150" stroke="#4f6b8a" stroke-width="1.5"/>
  <path d="M130 150 a40 18 0 0 0 80 0 z" fill="none" stroke="#4f6b8a" stroke-width="2"/>
  <text x="170" y="182" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="16" font-weight="700" fill="#7f93ad">供</text>
  <!-- 右盘:需 -->
  <line x1="510" y1="96" x2="510" y2="150" stroke="#4f6b8a" stroke-width="1.5"/>
  <path d="M470 150 a40 18 0 0 0 80 0 z" fill="none" stroke="#4f6b8a" stroke-width="2"/>
  <text x="510" y="182" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="16" font-weight="700" fill="#7f93ad">需</text>
</svg>
