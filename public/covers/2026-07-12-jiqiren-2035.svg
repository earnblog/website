<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:近端真实收入是一条贴地细线,远端TAM是一座悬在十年后的高塔">
  <rect width="680" height="300" fill="#1c2330"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">买的不是机器人,是2035这个年份</text>

  <!-- 地面基线 -->
  <line x1="60" y1="230" x2="632" y2="230" stroke="#2f394a" stroke-width="1.2"/>
  <text x="60" y="250" font-family="system-ui,sans-serif" font-size="11" fill="#6f8199">2026(现在)</text>
  <text x="556" y="250" font-family="system-ui,sans-serif" font-size="11" fill="#6f8199">2035</text>

  <!-- 近端:贴地细线(真实收入) -->
  <path d="M60 226 C 200 224, 320 222, 470 220" fill="none" stroke="#4f6b8a" stroke-width="2.2"/>
  <text x="120" y="214" font-family="system-ui,sans-serif" font-size="11.5" fill="#4f6b8a">真实收入:贴着地面的细线</text>

  <!-- 远端:高塔(远期TAM) -->
  <rect x="556" y="86" width="60" height="144" fill="#a8453a" opacity="0.85"/>
  <rect x="556" y="86" width="60" height="144" fill="none" stroke="#c8a96a" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="512" y="78" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a">远期TAM:十年后的高塔</text>

  <!-- 估值绳:从近端拴到远端塔顶 -->
  <path d="M470 220 C 520 200, 545 140, 586 92" fill="none" stroke="#b07d33" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="360" y="150" font-family="system-ui,sans-serif" font-size="11" fill="#b07d33">估值这根绳,拴在了远端</text>

  <line x1="48" y1="266" x2="632" y2="266" stroke="#2f394a" stroke-width="1"/>
  <text x="48" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">蓝=现在(几乎为零) · 红=想象力折现出的远期 · 金=把估值挂上高塔的那根绳</text>
</svg>
