<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:未来是仍在涌现的场人却想从中抽出一根线钉上精确的价格">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">给未来标价,是最古老的傲慢</text>

  <!-- 仍在生长的场:一片散点节点 -->
  <g fill="#4f6b8a" opacity="0.9">
    <circle cx="120" cy="110" r="4"/><circle cx="170" cy="150" r="5"/><circle cx="150" cy="200" r="4"/>
    <circle cx="210" cy="120" r="4"/><circle cx="240" cy="175" r="5"/><circle cx="200" cy="215" r="4"/>
    <circle cx="280" cy="140" r="5"/><circle cx="300" cy="195" r="4"/><circle cx="330" cy="115" r="4"/>
    <circle cx="360" cy="165" r="5"/><circle cx="340" cy="215" r="4"/><circle cx="410" cy="135" r="4"/>
    <circle cx="430" cy="190" r="5"/><circle cx="400" cy="230" r="3"/><circle cx="470" cy="160" r="4"/>
  </g>
  <g stroke="#33404f" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="120" y1="110" x2="170" y2="150"/><line x1="170" y1="150" x2="240" y2="175"/>
    <line x1="210" y1="120" x2="280" y2="140"/><line x1="280" y1="140" x2="360" y2="165"/>
    <line x1="330" y1="115" x2="410" y2="135"/><line x1="360" y1="165" x2="430" y2="190"/>
    <line x1="240" y1="175" x2="300" y2="195"/><line x1="410" y1="135" x2="470" y2="160"/>
  </g>
  <text x="120" y="255" font-family="system-ui,sans-serif" font-size="11.5" fill="#6f8199">未来:仍在涌现、合力生长的场</text>

  <!-- 从场里抽出一根线,钉上一个精确价签 -->
  <line x1="470" y1="160" x2="560" y2="120" stroke="#a8453a" stroke-width="1.6" stroke-dasharray="4 3"/>
  <rect x="556" y="98" width="86" height="30" rx="3" fill="#a8453a"/>
  <text x="599" y="118" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f4ede0" text-anchor="middle">$ 精确</text>
  <text x="512" y="150" font-family="system-ui,sans-serif" font-size="11" fill="#a8453a">抽一根线,钉个数</text>

  <line x1="48" y1="270" x2="632" y2="270" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="290" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">蓝=还在生长的复杂系统 · 红=想把它钉成一个精确数字的傲慢</text>
</svg>
