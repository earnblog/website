<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:退潮之后,靠真撑着的还站着,靠美粉饰的原形毕露">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="56" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">退潮之后,真假立判</text>
  <!-- 水位线 -->
  <line x1="40" y1="196" x2="640" y2="196" stroke="#4f6b8a" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="52" y="188" font-family="system-ui,sans-serif" font-size="11.5" fill="#4f6b8a">潮水退去</text>
  <!-- 靠真撑着的:三根立柱,还站着 -->
  <g fill="#c8a96a">
    <rect x="150" y="110" width="26" height="86"/>
    <rect x="220" y="126" width="26" height="70"/>
    <rect x="290" y="100" width="26" height="96"/>
  </g>
  <text x="235" y="228" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#c8a96a">靠真撑着的 · 还站着</text>
  <!-- 靠美粉饰的:塌下的画皮 -->
  <g fill="#a8453a" opacity="0.85">
    <path d="M420 196 l40 -8 l38 6 l40 -10 l40 12 l0 8 l-198 0 z"/>
  </g>
  <path d="M430 176 l14 -22 l10 20 z" fill="#7d3a33" opacity="0.7"/>
  <text x="518" y="228" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#b57d73">靠美粉饰的 · 原形毕露</text>
  <text x="340" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#8a8170">时间只做一件事:把假的还原成假的,把真的留下来</text>
</svg>
