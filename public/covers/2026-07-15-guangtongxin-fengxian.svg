<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:业绩增速最快处,风险回报率最差">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">增速711%,买的是最差的风险回报率</text>

  <!-- 增速脉冲曲线:低基数→超指数尖峰→回落 -->
  <path d="M70 220 C170 216 230 205 300 150 C340 118 360 80 372 70 C386 82 402 128 445 190 C490 226 560 232 620 230"
        fill="none" stroke="#cdd6e2" stroke-width="2.2"/>
  <circle cx="372" cy="70" r="4.5" fill="#c8a96a"/>
  <text x="300" y="62" font-family="system-ui,sans-serif" font-size="12" fill="#c8a96a">+711% · 增速见顶</text>

  <!-- 上行已被兑现(顶部区,金,短) -->
  <line x1="372" y1="70" x2="372" y2="100" stroke="#c8a96a" stroke-width="6" stroke-linecap="round"/>
  <text x="392" y="92" font-family="system-ui,sans-serif" font-size="10.5" fill="#c8a96a">上行:已被业绩兑现花掉(短)</text>

  <!-- 下行敞开(红,长) -->
  <line x1="372" y1="106" x2="372" y2="210" stroke="#a8453a" stroke-width="6" stroke-linecap="round"/>
  <text x="392" y="170" font-family="system-ui,sans-serif" font-size="10.5" fill="#a8453a">下行:随产能敞开(长)</text>

  <!-- 产能超指数堆积虚线 -->
  <path d="M70 235 C240 232 340 222 620 150" fill="none" stroke="#b07d33" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="452" y="140" font-family="system-ui,sans-serif" font-size="10.5" fill="#b07d33">资本开支产能超指数灌入</text>

  <line x1="48" y1="266" x2="632" y2="266" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">金=已兑现的上行(短) · 红=敞开的下行(长) · 赭=灌进来的产能 = 凹性</text>
</svg>
