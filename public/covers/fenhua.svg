<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:同一起点的两条分叉曲线,一升一平">
  <rect width="680" height="300" fill="#181f2b"/>
  <g stroke="#2a3342" stroke-width="1"><line x1="40" y1="80" x2="640" y2="80"/><line x1="40" y1="150" x2="640" y2="150"/><line x1="40" y1="220" x2="640" y2="220"/></g>
  <!-- 共同起点 -->
  <circle cx="90" cy="170" r="5" fill="#9b9385"/>
  <!-- 上行:增长 -->
  <path d="M90 170 C220 158 330 120 440 92 C520 72 580 60 636 52" fill="none" stroke="#c8a96a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="636" cy="52" r="4" fill="#c8a96a"/>
  <text x="556" y="44" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#c8a96a">有增长</text>
  <!-- 平/下行:停滞 -->
  <path d="M90 170 C220 178 330 188 440 196 C520 202 580 210 636 222" fill="none" stroke="#5b6b85" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="2 0"/>
  <circle cx="636" cy="222" r="4" fill="#5b6b85"/>
  <text x="540" y="244" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#5b6b85">无增长</text>
</svg>
