<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:超指数曲线冲向天花板,还在涨不等于不是泡沫">
  <rect width="680" height="300" fill="#1c2330"/>
  <g stroke="#2a3342" stroke-width="1"><line x1="40" y1="70" x2="640" y2="70"/><line x1="40" y1="240" x2="640" y2="240"/></g>
  <!-- 流动性天花板 -->
  <line x1="40" y1="70" x2="640" y2="70" stroke="#a8453a" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="632" y="62" text-anchor="end" font-family="system-ui,sans-serif" font-size="11.5" fill="#c06152">流动性极限</text>
  <!-- 超指数上冲曲线 -->
  <path d="M60 236 C 220 232, 340 220, 420 188 C 480 162, 512 120, 528 82" fill="none" stroke="#c8a96a" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="528" cy="82" r="4.5" fill="#c8a96a"/>
  <text x="528" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a">还在涨</text>
  <!-- 两个问题 -->
  <g font-family="'Noto Serif SC',serif">
    <text x="150" y="120" font-size="15" fill="#7f97b4">会不会继续涨?</text>
    <text x="150" y="150" font-size="12.5" fill="#6a7080" font-family="system-ui,sans-serif">— 概率问题</text>
    <text x="150" y="192" font-size="15" font-weight="700" fill="#c06152">是不是泡沫?</text>
    <text x="150" y="214" font-size="12.5" fill="#8a8170" font-family="system-ui,sans-serif">— 结构问题</text>
  </g>
  <text x="60" y="285" font-family="system-ui,sans-serif" font-size="12.5" fill="#8a8170">承认它还会膨胀,恰恰是它是泡沫的定义</text>
</svg>
