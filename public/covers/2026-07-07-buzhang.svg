<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:领涨的先透支,资金被迫下沉去填最后一块情绪洼地;洼地填平,可算的只剩次序">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="54" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">洼地填平,行情收笔</text>
  <!-- 基准线 -->
  <line x1="48" y1="240" x2="640" y2="240" stroke="#33404f" stroke-width="1.4"/>
  <!-- 已透支的强势柱(金,滞涨) -->
  <g fill="#c8a96a">
    <rect x="80" y="96" width="40" height="144"/>
    <rect x="140" y="120" width="40" height="120"/>
  </g>
  <text x="130" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#c8a96a">领涨·已透支滞涨</text>
  <!-- 资金被迫下沉箭头 -->
  <path d="M200 130 q70 30 128 66" fill="none" stroke="#b07d33" stroke-width="1.8" marker-end="url(#a2)"/>
  <text x="266" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#b07d33">存量资金被迫下沉</text>
  <!-- 被填的情绪洼地(赭,刚被填起) -->
  <g fill="#b07d33" opacity="0.9">
    <rect x="360" y="204" width="40" height="36"/>
    <rect x="420" y="192" width="40" height="48"/>
    <rect x="480" y="210" width="40" height="30"/>
    <rect x="540" y="198" width="40" height="42"/>
  </g>
  <text x="470" y="270" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="13" font-weight="700" fill="#b57d73">补涨:填的是情绪洼地,不是价值</text>
  <text x="470" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8a8170">只剩"谁还没涨"可算</text>
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#b07d33"/></marker>
  </defs>
</svg>
