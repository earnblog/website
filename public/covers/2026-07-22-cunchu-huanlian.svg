<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:存储领涨不是行情扩散,是同一个赌注换了张脸">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="50" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">看上去两个证人,其实一个源头</text>

  <!-- 顶部:同一个源头 -->
  <rect x="270" y="76" width="140" height="40" rx="3" fill="#33404f" stroke="#c8a96a" stroke-width="1.2"/>
  <text x="340" y="101" font-family="system-ui,sans-serif" font-size="12" fill="#c8a96a" text-anchor="middle">AI 资本开支</text>

  <!-- 分叉到两条腿 -->
  <path d="M300 116 L180 168" fill="none" stroke="#4f6b8a" stroke-width="1.5"/>
  <path d="M189 161 L176 170 L191 172" fill="#4f6b8a"/>
  <path d="M380 116 L500 168" fill="none" stroke="#4f6b8a" stroke-width="1.5"/>
  <path d="M489 172 L504 170 L491 161" fill="#4f6b8a"/>

  <!-- 两条腿 -->
  <rect x="96" y="172" width="168" height="44" rx="3" fill="#22303f"/>
  <text x="180" y="199" font-family="system-ui,sans-serif" font-size="12.5" fill="#9fb0c4" text-anchor="middle">AI 大票 · 涨</text>
  <rect x="416" y="172" width="168" height="44" rx="3" fill="#22303f"/>
  <text x="500" y="199" font-family="system-ui,sans-serif" font-size="12.5" fill="#9fb0c4" text-anchor="middle">存储股 · 涨</text>

  <!-- 看似互相印证的虚线 -->
  <path d="M264 194 L416 194" fill="none" stroke="#3a4556" stroke-width="1.3" stroke-dasharray="4 4"/>
  <text x="340" y="188" font-family="system-ui,sans-serif" font-size="10.5" fill="#7f8ba0" text-anchor="middle">看似:互相印证</text>

  <!-- 底部一句:一起断 -->
  <line x1="48" y1="248" x2="632" y2="248" stroke="#2a3342" stroke-width="1"/>
  <text x="340" y="274" font-family="'Noto Serif SC',serif" font-size="13.5" font-weight="700" fill="#a8453a" text-anchor="middle">两条腿长在同一根脊柱上——要断,是一起断</text>
</svg>
