<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:月度胜率图上站着的不是规律,是唯一没倒下的巧合">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">日历不生产收益</text>

  <!-- 12 根柱子,其中一根金色(七月),其余暗淡;若干倒下的柱子 -->
  <g fill="#3a465a">
    <rect x="60" y="180" width="26" height="52"/>
    <rect x="96" y="192" width="26" height="40"/>
    <rect x="132" y="172" width="26" height="60"/>
    <rect x="168" y="196" width="26" height="36"/>
    <rect x="204" y="184" width="26" height="48"/>
    <rect x="240" y="200" width="26" height="32"/>
  </g>
  <rect x="276" y="126" width="26" height="106" fill="#c8a96a"/>
  <text x="264" y="118" font-family="system-ui,sans-serif" font-size="12" fill="#c8a96a">七月</text>
  <g fill="#3a465a">
    <rect x="312" y="188" width="26" height="44"/>
    <rect x="348" y="176" width="26" height="56"/>
    <rect x="384" y="198" width="26" height="34"/>
    <rect x="420" y="186" width="26" height="46"/>
    <rect x="456" y="194" width="26" height="38"/>
  </g>
  <line x1="52" y1="232" x2="500" y2="232" stroke="#4f6b8a" stroke-width="1.4"/>

  <!-- 坟场:倒下的柱子 -->
  <g fill="#2a3342">
    <rect x="522" y="222" width="42" height="10"/>
    <rect x="522" y="208" width="56" height="10"/>
    <rect x="522" y="194" width="34" height="10"/>
    <rect x="522" y="180" width="62" height="10"/>
  </g>
  <text x="522" y="170" font-family="system-ui,sans-serif" font-size="11.5" fill="#7f8ba0">失效的月份效应</text>

  <text x="48" y="272" font-family="system-ui,sans-serif" font-size="11.5" fill="#b57d73">不是规律</text>
  <line x1="46" y1="268" x2="122" y2="268" stroke="#a8453a" stroke-width="1.4"/>
  <text x="142" y="272" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a">是所有被你忘记的巧合里,唯一还没倒下的那一个</text>
</svg>
