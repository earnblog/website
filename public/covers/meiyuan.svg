<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:避险资金合力汇成向上的美元箭头">
  <rect width="680" height="300" fill="#1c2330"/>
  <!-- 汇入的合力箭头 -->
  <g stroke="#4f6b8a" stroke-width="1.5" opacity="0.7">
    <line x1="120" y1="60" x2="320" y2="150"/><line x1="90" y1="120" x2="320" y2="150"/>
    <line x1="110" y1="200" x2="320" y2="150"/><line x1="150" y1="250" x2="320" y2="150"/>
    <line x1="560" y1="60" x2="360" y2="150"/><line x1="590" y1="120" x2="360" y2="150"/>
    <line x1="570" y1="200" x2="360" y2="150"/><line x1="530" y1="250" x2="360" y2="150"/>
  </g>
  <g fill="#5b6b85"><circle cx="120" cy="60" r="3"/><circle cx="90" cy="120" r="3"/><circle cx="110" cy="200" r="3"/><circle cx="150" cy="250" r="3"/><circle cx="560" cy="60" r="3"/><circle cx="590" cy="120" r="3"/><circle cx="570" cy="200" r="3"/><circle cx="530" cy="250" r="3"/></g>
  <!-- 向上的箭 -->
  <line x1="340" y1="230" x2="340" y2="80" stroke="#c8a96a" stroke-width="5" stroke-linecap="round"/>
  <path d="M340 64 l-14 22 l28 0 z" fill="#c8a96a"/>
  <text x="340" y="170" text-anchor="middle" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#e3c587">$</text>
</svg>
