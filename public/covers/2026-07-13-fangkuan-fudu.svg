<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:涨跌幅闸门放宽只改变潮水到岸的时间,不改变水位">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">放的不是风险,是时间</text>

  <!-- 同一水位基准线 -->
  <line x1="60" y1="150" x2="620" y2="150" stroke="#a8453a" stroke-width="1.2" stroke-dasharray="5 5"/>
  <text x="470" y="142" font-family="system-ui,sans-serif" font-size="11" fill="#a8453a">同一价值(水位)</text>

  <!-- 左:窄闸门,慢 -->
  <rect x="90" y="150" width="150" height="70" fill="#24303f"/>
  <rect x="158" y="150" width="14" height="52" fill="#4f6b8a"/>
  <path d="M120 210 Q165 200 210 210" stroke="#4f6b8a" stroke-width="2" fill="none"/>
  <text x="98" y="242" font-family="system-ui,sans-serif" font-size="11.5" fill="#6f8199">窄闸门 5%:几天才到岸</text>

  <!-- 右:宽闸门,快 -->
  <rect x="440" y="150" width="150" height="70" fill="#24303f"/>
  <rect x="500" y="150" width="30" height="52" fill="#c8a96a"/>
  <path d="M470 208 Q515 196 560 208" stroke="#c8a96a" stroke-width="2" fill="none"/>
  <text x="448" y="242" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a">宽闸门 10%:一两天到岸</text>

  <!-- 中间箭头 -->
  <line x1="270" y1="185" x2="410" y2="185" stroke="#7f8ba0" stroke-width="1.4" marker-end="url(#a1)"/>
  <defs><marker id="a1" markerWidth="9" markerHeight="9" refX="4" refY="6" orient="auto"><path d="M0 6 L4 0 L8 6 z" fill="#7f8ba0"/></marker></defs>
  <text x="284" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">只快了,没多也没少</text>

  <line x1="48" y1="268" x2="632" y2="268" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">红=同一水位(价值不变) · 闸门宽窄只决定潮水几时到岸,风险在水里,不在闸门上</text>
</svg>
