<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:价格偏离的不是基本面,是你心里那根估值锚">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">偏离的不是基本面,是你的锚</text>

  <!-- 价格曲线:所有人合力的表决 -->
  <path d="M70 180 C130 150 175 200 230 160 C285 120 330 190 385 140 C440 95 485 165 540 110 C580 72 605 100 620 88"
        fill="none" stroke="#cdd6e2" stroke-width="2.2"/>
  <text x="70" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">价格 = 所有人合力实时表决</text>

  <!-- 三根不同的"基本面"锚线,彼此矛盾 -->
  <line x1="70" y1="130" x2="632" y2="130" stroke="#4f6b8a" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="560" y="126" font-family="system-ui,sans-serif" font-size="10" fill="#4f6b8a">锚A:20倍PE</text>
  <line x1="70" y1="160" x2="632" y2="160" stroke="#c8a96a" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="560" y="156" font-family="system-ui,sans-serif" font-size="10" fill="#c8a96a">锚B:成长贴现</text>
  <line x1="70" y1="196" x2="632" y2="196" stroke="#a8453a" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="560" y="212" font-family="system-ui,sans-serif" font-size="10" fill="#a8453a">锚C:清算价值</text>

  <text x="250" y="250" font-family="'Noto Serif SC',serif" font-size="12.5" fill="#cdd6e2">"真实基本面"这条线,到底画在哪?</text>

  <line x1="48" y1="266" x2="632" y2="266" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">三根锚互相打架 · 价格没有"应该在"的位置,只在被表决出的位置</text>
</svg>
