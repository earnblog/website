<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:现金流推的曲线垫着真实需求,债务顶的曲线垫着借来的时间,信用利差走阔">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">借来的不是算力,是时间</text>

  <!-- 基线 -->
  <line x1="60" y1="210" x2="628" y2="210" stroke="#33404f" stroke-width="1.2"/>

  <!-- 现金流推的曲线(蓝,平稳,底部实心=真实需求) -->
  <path d="M60 200 q120 -18 240 -46" fill="none" stroke="#4f6b8a" stroke-width="2.6"/>
  <rect x="60" y="200" width="240" height="10" fill="#4f6b8a" opacity="0.35"/>
  <text x="90" y="188" font-family="system-ui,sans-serif" font-size="11.5" fill="#4f6b8a">现金流推 · 垫真实需求</text>

  <!-- 债务顶的曲线(金→红,末端翘起,底部虚线=借来的时间) -->
  <path d="M300 154 q120 -30 200 -70 q60 -20 88 22" fill="none" stroke="#c8a96a" stroke-width="2.6"/>
  <line x1="300" y1="210" x2="588" y2="210" stroke="#b07d33" stroke-width="1.4" stroke-dasharray="5 5" opacity="0.8"/>
  <text x="392" y="96" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a">债务顶 · 垫借来的时间</text>

  <!-- 末端翘起+回抽箭头(红) -->
  <circle cx="588" cy="106" r="4.5" fill="#a8453a"/>
  <path d="M588 106 l0 40" fill="none" stroke="#a8453a" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- 信用利差走阔(右下角两条张开的线) -->
  <g>
    <path d="M470 250 l150 -8" fill="none" stroke="#7f8ba0" stroke-width="1.6"/>
    <path d="M470 250 l150 20" fill="none" stroke="#a8453a" stroke-width="1.6"/>
    <text x="470" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#b57d73">利差走阔 = 债市的第一张反对票</text>
  </g>
</svg>
