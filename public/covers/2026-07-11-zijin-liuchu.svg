<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:一整周的净流出是一本账,盘口最后一笔成交才是价格">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">价格,只活在最后一笔成交里</text>

  <!-- 左侧:总量水池(流出) -->
  <text x="48" y="96" font-family="system-ui,sans-serif" font-size="12" fill="#7f8ba0">总量 · 一周净流出 $17.2B</text>
  <rect x="48" y="108" width="150" height="120" rx="4" fill="none" stroke="#3a465a" stroke-width="1.4"/>
  <rect x="48" y="150" width="150" height="78" rx="0" fill="#a8453a" opacity="0.28"/>
  <path d="M198 128 L 250 128" stroke="#b57d73" stroke-width="2" marker-end="url(#a)"/>
  <path d="M198 168 L 250 168" stroke="#b57d73" stroke-width="2" marker-end="url(#a)"/>
  <text x="204" y="210" font-family="system-ui,sans-serif" font-size="10.5" fill="#7f8ba0">场外份额转移</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#b57d73"/></marker></defs>

  <!-- 右侧:边际盘口(价格坚挺) -->
  <text x="392" y="96" font-family="system-ui,sans-serif" font-size="12" fill="#7f8ba0">边际 · 盘口成交</text>
  <line x1="392" y1="110" x2="392" y2="228" stroke="#3a465a" stroke-width="1.2"/>
  <line x1="392" y1="150" x2="632" y2="150" stroke="#4f6b8a" stroke-width="2.4"/>
  <circle cx="592" cy="150" r="6" fill="#c8a96a"/>
  <text x="470" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#c8a96a">价格纹丝不动</text>
  <text x="440" y="200" font-family="system-ui,sans-serif" font-size="10.5" fill="#7f8ba0">没人肯低价卖</text>

  <line x1="48" y1="252" x2="632" y2="252" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="278" font-family="system-ui,sans-serif" font-size="11.5" fill="#b57d73">搬得动仓位的是资金</text>
  <text x="360" y="278" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a">搬不动那个不肯让路的人</text>
</svg>
