<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:牛鞭效应终端需求动一寸传到最上游硅片被放大成暴缺">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">涨的不是短缺,是囤货的影子</text>

  <!-- 牛鞭:从终端(小)到硅片(大)逐级放大的波形 -->
  <path d="M70 175 Q110 172 150 178 Q195 150 240 182 Q290 128 340 186
           Q395 96 450 190 Q510 60 570 196 Q600 40 610 120"
        fill="none" stroke="#b07d33" stroke-width="2.4"/>
  <circle cx="610" cy="120" r="6" fill="#a8453a"/>

  <!-- 各环节标注 -->
  <text x="60" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#6f8199">终端需求</text>
  <text x="300" y="118" font-family="system-ui,sans-serif" font-size="11" fill="#b07d33">层层加库存</text>
  <text x="556" y="112" font-family="system-ui,sans-serif" font-size="11.5" fill="#a8453a">硅片:鞭梢·暴缺</text>

  <!-- 基线 -->
  <line x1="60" y1="178" x2="560" y2="178" stroke="#2a3342" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- 风险回报率提示 -->
  <text x="48" y="240" font-family="system-ui,sans-serif" font-size="11.5" fill="#7f8ba0">翻倍之后:上行越来越薄,下行越来越厚 —— 追的是烧红的炭</text>

  <line x1="48" y1="262" x2="632" y2="262" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="286" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">赭=被供应链逐级放大的波动 · 红=站在鞭梢、涨最猛也抽最狠的硅片</text>
</svg>
