<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:市场不是等着被通知的人,是所有人已经下注之后的净和">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">"还没定价",说的不是市场,是你</text>

  <!-- 众多下注者的小竖线,汇入一个数字 -->
  <g stroke="#4f6b8a" stroke-width="2" opacity="0.75">
    <line x1="66" y1="196" x2="66" y2="150"/>
    <line x1="88" y1="196" x2="88" y2="128"/>
    <line x1="110" y1="196" x2="110" y2="168"/>
    <line x1="132" y1="196" x2="132" y2="118"/>
    <line x1="154" y1="196" x2="154" y2="160"/>
    <line x1="176" y1="196" x2="176" y2="136"/>
    <line x1="198" y1="196" x2="198" y2="176"/>
    <line x1="220" y1="196" x2="220" y2="124"/>
    <line x1="242" y1="196" x2="242" y2="158"/>
    <line x1="264" y1="196" x2="264" y2="142"/>
    <line x1="286" y1="196" x2="286" y2="172"/>
    <line x1="308" y1="196" x2="308" y2="132"/>
  </g>
  <line x1="56" y1="196" x2="320" y2="196" stroke="#3a465a" stroke-width="1.2"/>
  <text x="56" y="216" font-family="system-ui,sans-serif" font-size="11.5" fill="#7f8ba0">每个人的概率 · 每个人的仓位</text>

  <!-- 汇聚箭头 -->
  <path d="M336 168 L400 168" stroke="#c8a96a" stroke-width="1.8" marker-end="url(#a10)"/>
  <defs><marker id="a10" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#c8a96a"/></marker></defs>

  <!-- 净和 -->
  <rect x="414" y="140" width="196" height="56" fill="none" stroke="#c8a96a" stroke-width="1.6"/>
  <text x="512" y="175" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="18" font-weight="700" fill="#c8a96a">价格 = 净和</text>
  <text x="414" y="216" font-family="system-ui,sans-serif" font-size="11.5" fill="#7f8ba0">不是某个人的判断,是全体的加权</text>

  <text x="48" y="266" font-family="system-ui,sans-serif" font-size="11.5" fill="#b57d73">市场不是等着被通知的人</text>
  <line x1="46" y1="262" x2="212" y2="262" stroke="#a8453a" stroke-width="1.4"/>
  <text x="232" y="266" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a">它是所有人已经通知完之后的那个余数</text>
</svg>
