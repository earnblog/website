<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:一串数据点里被过度放大的那一个">
  <rect width="680" height="300" fill="#181f2b"/>
  <line x1="40" y1="200" x2="640" y2="200" stroke="#2a3342" stroke-width="1"/>
  <!-- 趋势线(浅) -->
  <path d="M50 190 L130 178 L210 182 L290 160 L370 168 L450 150 L530 156 L620 138" fill="none" stroke="#3f5470" stroke-width="2" opacity="0.7"/>
  <!-- 一串小数据点 -->
  <g fill="#5b6b85">
    <circle cx="50" cy="190" r="4"/><circle cx="130" cy="178" r="4"/><circle cx="210" cy="182" r="4"/>
    <circle cx="370" cy="168" r="4"/><circle cx="450" cy="150" r="4"/><circle cx="530" cy="156" r="4"/><circle cx="620" cy="138" r="4"/>
  </g>
  <!-- 被过度放大的那一个 -->
  <circle cx="290" cy="160" r="26" fill="none" stroke="#c8a96a" stroke-width="2"/>
  <circle cx="290" cy="160" r="9" fill="#c8a96a"/>
  <text x="290" y="112" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="20" font-weight="700" fill="#e3c587">?</text>
  <text x="290" y="238" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="13" fill="#9b9385">别把整幅画押在这一点上</text>
</svg>
