<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:悲观不是买点,是信用还在收缩的读数">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">悲观,是信用还在收缩的读数</text>

  <!-- 信用潮水波形 -->
  <path d="M60 150 C130 96, 200 96, 270 150 S410 204, 480 150 S620 96, 630 118" fill="none" stroke="#4f6b8a" stroke-width="2.6"/>

  <!-- 情绪影子:同形但衰减、下移,虚线 -->
  <path d="M60 186 C130 146, 200 146, 270 186 S410 226, 480 186 S620 146, 630 163" fill="none" stroke="#7f8ba0" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="636" y="167" font-family="system-ui,sans-serif" font-size="10.5" fill="#7f8ba0">情绪</text>
  <text x="636" y="122" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a">信用</text>

  <!-- 退潮区:标注"还在收缩" -->
  <line x1="345" y1="88" x2="345" y2="215" stroke="#a8453a" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="400" cy="196" r="5.5" fill="#a8453a"/>
  <text x="400" y="228" font-family="system-ui,sans-serif" font-size="11" fill="#a8453a" text-anchor="middle">情绪低位 ≠ 底</text>

  <text x="150" y="86" font-family="system-ui,sans-serif" font-size="11" fill="#4f6b8a" text-anchor="middle">信用扩张</text>
  <text x="410" y="86" font-family="system-ui,sans-serif" font-size="11" fill="#a8453a" text-anchor="middle">信用收缩 · 仍在退潮</text>

  <line x1="48" y1="248" x2="632" y2="248" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="270" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">蓝=信用潮水 · 灰虚线=情绪(信用的影子,同形滞后) · 红=清单勾满之处</text>
  <text x="48" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">五个"底"全是结果:用结果预测原因,是把因果倒着跑</text>
</svg>
