<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:喊话越密集越说明底下是空的,需要被力挺的不是真的强">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">喊得越响,底下越空</text>

  <!-- 喇叭 -->
  <path d="M96 150 L150 150 L206 118 L206 182 L150 150" fill="#222c3a" stroke="#c8a96a" stroke-width="1.6" stroke-linejoin="round"/>
  <rect x="86" y="140" width="14" height="20" rx="2" fill="#c8a96a"/>
  <!-- 声波 -->
  <path d="M220 128 q18 22 0 44" fill="none" stroke="#c8a96a" stroke-width="1.5"/>
  <path d="M234 118 q28 32 0 64" fill="none" stroke="#c8a96a" stroke-width="1.3" opacity="0.7"/>
  <path d="M248 108 q40 42 0 84" fill="none" stroke="#c8a96a" stroke-width="1.1" opacity="0.45"/>
  <text x="86" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#8a94a6">无需担忧·长期向好·布局良机</text>

  <!-- 正在下跌的价格 -->
  <polyline points="330,120 380,128 430,122 480,150 530,175 580,200 620,214"
            fill="none" stroke="#a8453a" stroke-width="2.2"/>
  <circle cx="620" cy="214" r="4" fill="#a8453a"/>
  <text x="470" y="112" font-family="system-ui,sans-serif" font-size="12" fill="#a8453a">被喊话背书的价格,仍在下坠</text>

  <line x1="48" y1="266" x2="632" y2="266" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">金=密集的喊话 · 红=不听命令的价格:声音从不创造力量</text>
</svg>
