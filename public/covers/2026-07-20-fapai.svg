<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:这一周,给市场发牌的,是被押注的那个人">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="48" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">同一个价格,两种输入</text>

  <!-- 左:外生输入 -->
  <text x="48" y="82" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">数据周:输入来自外部,四面八方,互不相干</text>

  <path d="M52 108 L196 152" fill="none" stroke="#4f6b8a" stroke-width="1.3"/>
  <path d="M52 134 L196 156" fill="none" stroke="#4f6b8a" stroke-width="1.3"/>
  <path d="M52 162 L196 160" fill="none" stroke="#4f6b8a" stroke-width="1.3"/>
  <path d="M52 190 L196 164" fill="none" stroke="#4f6b8a" stroke-width="1.3"/>
  <path d="M52 218 L196 168" fill="none" stroke="#4f6b8a" stroke-width="1.3"/>

  <text x="48" y="104" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a">CPI · 7-14</text>
  <text x="48" y="130" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a">PPI · 7-15</text>
  <text x="48" y="158" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a">就业 · 7-02</text>
  <text x="48" y="186" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a">库存 · 信贷</text>
  <text x="48" y="214" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a">千万次独立判断</text>

  <!-- 中:价格 -->
  <circle cx="228" cy="160" r="32" fill="#1c2330" stroke="#c8a96a" stroke-width="1.6"/>
  <text x="228" y="165" font-family="'Noto Serif SC',serif" font-size="15" font-weight="700" fill="#c8a96a" text-anchor="middle">价格</text>

  <!-- 分隔 -->
  <line x1="300" y1="70" x2="300" y2="272" stroke="#2a3342" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- 右:内生闭环 -->
  <text x="332" y="82" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">财报周:唯一的新消息,由被押注的那个人发出</text>

  <rect x="332" y="110" width="126" height="52" fill="#1f2937" stroke="#2a3342" stroke-width="1"/>
  <text x="395" y="134" font-family="system-ui,sans-serif" font-size="11.5" fill="#7f8ba0" text-anchor="middle">被定价的公司</text>
  <text x="395" y="151" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a" text-anchor="middle">TSLA · 7-22 等</text>

  <rect x="506" y="110" width="126" height="52" fill="#2e2020" stroke="#a8453a" stroke-width="1.4"/>
  <text x="569" y="134" font-family="system-ui,sans-serif" font-size="11.5" fill="#a8453a" text-anchor="middle">指引</text>
  <text x="569" y="151" font-family="system-ui,sans-serif" font-size="10.5" fill="#a8453a" text-anchor="middle">不是信息,是要约</text>

  <path d="M458 136 L500 136" fill="none" stroke="#a8453a" stroke-width="1.6"/>
  <path d="M494 132 L502 136 L494 140" fill="#a8453a"/>

  <rect x="419" y="210" width="126" height="46" fill="#22303f" stroke="#2a3342" stroke-width="1"/>
  <text x="482" y="238" font-family="system-ui,sans-serif" font-size="11.5" fill="#c8a96a" text-anchor="middle">市场按指引重估</text>

  <path d="M569 162 L569 233 L551 233" fill="none" stroke="#b07d33" stroke-width="1.6"/>
  <path d="M557 229 L548 233 L557 237" fill="#b07d33"/>
  <path d="M413 233 L395 233 L395 164" fill="none" stroke="#b07d33" stroke-width="1.6"/>
  <path d="M391 172 L395 162 L399 172" fill="#b07d33"/>

  <text x="332" y="282" font-family="system-ui,sans-serif" font-size="10.5" fill="#7f8ba0">环是闭的:定价的依据,由被定价的人执笔</text>
</svg>
