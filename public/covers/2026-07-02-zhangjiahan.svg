<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:一支向上的箭,根部分成需求与供给两条">
  <rect width="680" height="300" fill="#181f2b"/>
  <g stroke="#2a3342" stroke-width="1"><line x1="40" y1="90" x2="640" y2="90"/><line x1="40" y1="160" x2="640" y2="160"/><line x1="40" y1="230" x2="640" y2="230"/></g>
  <!-- 主箭:向上 -->
  <line x1="340" y1="150" x2="340" y2="66" stroke="#c8a96a" stroke-width="5" stroke-linecap="round"/>
  <path d="M340 52 l-13 20 l26 0 z" fill="#c8a96a"/>
  <text x="360" y="70" font-family="'Noto Serif SC',serif" font-size="15" font-weight="700" fill="#e3c587">涨价</text>
  <!-- 根部分叉:两个原因 -->
  <line x1="340" y1="150" x2="220" y2="230" stroke="#4f6b8a" stroke-width="3" stroke-linecap="round"/>
  <line x1="340" y1="150" x2="460" y2="230" stroke="#a8453a" stroke-width="3" stroke-linecap="round"/>
  <text x="200" y="252" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#7f93ad">需求?</text>
  <text x="480" y="252" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#c06152">供给?</text>
  <circle cx="340" cy="150" r="6" fill="#c8a96a"/>
</svg>
