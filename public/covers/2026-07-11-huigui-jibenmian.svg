<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:概念、预期、业绩是同一个反身性循环在换抵押品,越换越硬却始终是抵押品">
  <rect width="680" height="300" fill="#1c2330"/>
  <text x="48" y="52" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">同一个循环,越换越硬的抵押品</text>

  <!-- 三段台阶:概念→预期→业绩,逐级抬高但都在水面上 -->
  <line x1="48" y1="238" x2="632" y2="238" stroke="#3a465a" stroke-width="1" stroke-dasharray="4 5"/>
  <text x="560" y="232" font-family="system-ui,sans-serif" font-size="10.5" fill="#7f8ba0">预期水面</text>

  <rect x="70" y="196" width="120" height="42" fill="#4f6b8a" opacity="0.5"/>
  <text x="92" y="222" font-family="system-ui,sans-serif" font-size="12" fill="#cdd6e2">概念</text>

  <rect x="240" y="160" width="120" height="78" fill="#b07d33" opacity="0.5"/>
  <text x="276" y="204" font-family="system-ui,sans-serif" font-size="12" fill="#e7d3a8">预期</text>

  <rect x="410" y="120" width="120" height="118" fill="#c8a96a" opacity="0.55"/>
  <text x="446" y="184" font-family="system-ui,sans-serif" font-size="12" fill="#1c2330">业绩</text>

  <!-- 越换越硬箭头 -->
  <path d="M190 176 L 240 176" stroke="#7f8ba0" stroke-width="1.8" marker-end="url(#h)"/>
  <path d="M360 150 L 410 150" stroke="#7f8ba0" stroke-width="1.8" marker-end="url(#h)"/>
  <path d="M530 108 L 580 92" stroke="#a8453a" stroke-width="1.8" marker-end="url(#h)"/>
  <text x="548" y="86" font-family="system-ui,sans-serif" font-size="10.5" fill="#b57d73">再没有更硬的</text>
  <defs><marker id="h" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#8794a8"/></marker></defs>

  <text x="48" y="278" font-family="system-ui,sans-serif" font-size="11.5" fill="#7f8ba0">市场没有地面,只有此刻站的人最多的那块浮板</text>
</svg>
