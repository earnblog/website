<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="封面:300款全球首发,发的不是需求,是产能">
  <rect width="680" height="300" fill="#181f2b"/>
  <text x="48" y="50" font-family="'Noto Serif SC',serif" font-size="17" font-weight="700" fill="#c8a96a">首发的不是需求,是产能</text>

  <!-- 展馆边框:10万平米 -->
  <rect x="72" y="80" width="330" height="140" fill="none" stroke="#4f6b8a" stroke-width="1.6"/>
  <text x="237" y="72" font-family="system-ui,sans-serif" font-size="10.5" fill="#4f6b8a" text-anchor="middle">10万㎡ · 1100家企业挤在里面</text>

  <!-- 密集同构的展台方块(供给) -->
  <g fill="#c8a96a" opacity="0.85">
    <rect x="92" y="100" width="16" height="16"/><rect x="118" y="100" width="16" height="16"/><rect x="144" y="100" width="16" height="16"/><rect x="170" y="100" width="16" height="16"/><rect x="196" y="100" width="16" height="16"/><rect x="222" y="100" width="16" height="16"/><rect x="248" y="100" width="16" height="16"/><rect x="274" y="100" width="16" height="16"/><rect x="300" y="100" width="16" height="16"/><rect x="326" y="100" width="16" height="16"/><rect x="352" y="100" width="16" height="16"/>
    <rect x="92" y="126" width="16" height="16"/><rect x="118" y="126" width="16" height="16"/><rect x="144" y="126" width="16" height="16"/><rect x="170" y="126" width="16" height="16"/><rect x="196" y="126" width="16" height="16"/><rect x="222" y="126" width="16" height="16"/><rect x="248" y="126" width="16" height="16"/><rect x="274" y="126" width="16" height="16"/><rect x="300" y="126" width="16" height="16"/><rect x="326" y="126" width="16" height="16"/><rect x="352" y="126" width="16" height="16"/>
    <rect x="92" y="152" width="16" height="16"/><rect x="118" y="152" width="16" height="16"/><rect x="144" y="152" width="16" height="16"/><rect x="170" y="152" width="16" height="16"/><rect x="196" y="152" width="16" height="16"/><rect x="222" y="152" width="16" height="16"/><rect x="248" y="152" width="16" height="16"/><rect x="274" y="152" width="16" height="16"/><rect x="300" y="152" width="16" height="16"/><rect x="326" y="152" width="16" height="16"/><rect x="352" y="152" width="16" height="16"/>
    <rect x="92" y="178" width="16" height="16"/><rect x="118" y="178" width="16" height="16"/><rect x="144" y="178" width="16" height="16"/><rect x="170" y="178" width="16" height="16"/><rect x="196" y="178" width="16" height="16"/><rect x="222" y="178" width="16" height="16"/><rect x="248" y="178" width="16" height="16"/><rect x="274" y="178" width="16" height="16"/><rect x="300" y="178" width="16" height="16"/><rect x="326" y="178" width="16" height="16"/><rect x="352" y="178" width="16" height="16"/>
  </g>
  <text x="237" y="238" font-family="system-ui,sans-serif" font-size="10.5" fill="#c8a96a" text-anchor="middle">300款全球首发 · 高度同构,来自同一条产能曲线</text>

  <!-- 互相看的箭头:面对面,不朝外 -->
  <path d="M198 214 L150 214" fill="none" stroke="#b07d33" stroke-width="1.4"/>
  <path d="M276 214 L324 214" fill="none" stroke="#b07d33" stroke-width="1.4"/>

  <!-- 右侧:空的需求侧 -->
  <line x1="440" y1="80" x2="440" y2="220" stroke="#2a3342" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="480" y="120" width="120" height="62" fill="none" stroke="#a8453a" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="540" y="146" font-family="system-ui,sans-serif" font-size="11" fill="#a8453a" text-anchor="middle">真正的需求</text>
  <text x="540" y="165" font-family="system-ui,sans-serif" font-size="10" fill="#7f8ba0" text-anchor="middle">安静,不上展台</text>
  <text x="540" y="200" font-family="system-ui,sans-serif" font-size="10" fill="#7f8ba0" text-anchor="middle">以订单/付款/复购出现</text>

  <line x1="48" y1="254" x2="632" y2="254" stroke="#2a3342" stroke-width="1"/>
  <text x="48" y="274" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">金=供给的密度(展台/首发) · 赭=厂商面对面看到的是彼此 · 红虚=不在合影里的需求</text>
  <text x="48" y="291" font-family="system-ui,sans-serif" font-size="11" fill="#7f8ba0">展会不是需求的温度计,是产能的合影</text>
</svg>
