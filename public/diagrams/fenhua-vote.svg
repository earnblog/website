<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img" aria-label="股市分化示意图:同一起点因增长预期不同而分叉">
  <rect width="680" height="360" fill="#fbf9f4"/>
  <line x1="40" y1="320" x2="640" y2="320" stroke="#ddd4c4" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="320" stroke="#ddd4c4" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="120" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#8a8170">同一起点</text>
  <circle cx="120" cy="210" r="5" fill="#3a352c"/>
  <!-- 有增长:上行 -->
  <path d="M120 210 C260 192 360 140 460 104 C540 76 590 60 636 50" fill="none" stroke="#b07d33" stroke-width="3" stroke-linecap="round"/>
  <circle cx="636" cy="50" r="4" fill="#b07d33"/>
  <text x="548" y="42" font-family="'Noto Serif SC',serif" font-size="13" font-weight="700" fill="#b07d33">投票:有增长</text>
  <!-- 无增长:走平偏下 -->
  <path d="M120 210 C260 220 360 232 460 244 C540 254 590 264 636 276" fill="none" stroke="#4f6b8a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="636" cy="276" r="4" fill="#4f6b8a"/>
  <text x="540" y="298" font-family="'Noto Serif SC',serif" font-size="13" font-weight="700" fill="#4f6b8a">投票:无增长</text>
  <text x="44" y="24" font-family="system-ui,sans-serif" font-size="11.5" fill="#8a8170">短期是情绪,长期的水位是增长预期</text>
</svg>
