<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img" aria-label="一个驱动变量派生出看似独立的两条腿,涨时相互印证,跌时一起断">
  <rect width="680" height="360" fill="#fbf9f4"/>

  <!-- 顶部:同一个源头 -->
  <rect x="248" y="30" width="184" height="46" rx="4" fill="#33404f"/>
  <text x="340" y="52" font-family="'Noto Serif SC',serif" font-size="13.5" font-weight="700" fill="#fbf9f4" text-anchor="middle">AI 资本开支</text>
  <text x="340" y="69" font-family="system-ui,sans-serif" font-size="10.5" fill="#c8a96a" text-anchor="middle">唯一的驱动变量</text>

  <!-- 分叉箭头 -->
  <path d="M300 76 L188 128" fill="none" stroke="#4f6b8a" stroke-width="1.6"/>
  <path d="M196 121 L184 130 L198 132" fill="#4f6b8a"/>
  <path d="M380 76 L492 128" fill="none" stroke="#4f6b8a" stroke-width="1.6"/>
  <path d="M482 132 L496 130 L484 121" fill="#4f6b8a"/>

  <!-- 两条腿 -->
  <rect x="96" y="132" width="184" height="52" rx="4" fill="none" stroke="#4f6b8a" stroke-width="1.4"/>
  <text x="188" y="158" font-family="'Noto Serif SC',serif" font-size="13" font-weight="700" fill="#33404f" text-anchor="middle">AI 大票</text>
  <text x="188" y="176" font-family="system-ui,sans-serif" font-size="10.5" fill="#7a6f5c" text-anchor="middle">直接的股权故事</text>

  <rect x="400" y="132" width="184" height="52" rx="4" fill="none" stroke="#4f6b8a" stroke-width="1.4"/>
  <text x="492" y="158" font-family="'Noto Serif SC',serif" font-size="13" font-weight="700" fill="#33404f" text-anchor="middle">存储股</text>
  <text x="492" y="176" font-family="system-ui,sans-serif" font-size="10.5" fill="#7a6f5c" text-anchor="middle">晶圆被抽去做HBM</text>

  <!-- 相互印证(看似) -->
  <path d="M280 158 L400 158" fill="none" stroke="#ddd4c4" stroke-width="1.4" stroke-dasharray="4 4"/>
  <text x="340" y="152" font-family="system-ui,sans-serif" font-size="10" fill="#b07d33" text-anchor="middle">看似:两个证人互相印证</text>

  <!-- 回流箭头形成环 -->
  <path d="M188 184 C 188 236, 300 250, 330 250" fill="none" stroke="#c8a96a" stroke-width="1.6"/>
  <path d="M492 184 C 492 236, 380 250, 350 250" fill="none" stroke="#c8a96a" stroke-width="1.6"/>
  <rect x="238" y="232" width="204" height="40" rx="4" fill="#f3ecdc" stroke="#c8a96a" stroke-width="1.2"/>
  <text x="340" y="250" font-family="system-ui,sans-serif" font-size="11" fill="#33404f" text-anchor="middle">被读成"需求广泛·周期健康"</text>
  <text x="340" y="265" font-family="system-ui,sans-serif" font-size="10.5" fill="#7a6f5c" text-anchor="middle">→ 更多钱涌入 → 支持更多资本开支</text>

  <!-- 环回顶部 -->
  <path d="M340 232 C 340 200, 340 130, 340 78" fill="none" stroke="#c8a96a" stroke-width="1.6" stroke-dasharray="5 4"/>
  <path d="M336 90 L340 76 L344 90" fill="#c8a96a"/>
  <text x="352" y="150" font-family="system-ui,sans-serif" font-size="10" fill="#c8a96a" text-anchor="start">自我强化的环</text>

  <!-- 底部:一起断 -->
  <line x1="60" y1="300" x2="620" y2="300" stroke="#ddd4c4" stroke-width="1"/>
  <text x="60" y="322" font-family="system-ui,sans-serif" font-size="11.5" fill="#a8453a">开支一松:晶圆放回普通内存,存储跌;叙事转凉,大票跌。</text>
  <text x="60" y="341" font-family="'Noto Serif SC',serif" font-size="12.5" font-weight="700" fill="#a8453a">两条腿长在同一根脊柱上——要断,是一起断。</text>
</svg>
