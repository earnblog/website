<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img" aria-label="趋势早期多因素汇入价格,末期只剩价格自我循环">
  <rect width="680" height="360" fill="#fbf9f4"/>
  <line x1="340" y1="40" x2="340" y2="320" stroke="#ddd4c4" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="175" y="42" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="16" font-weight="700" fill="#4f6b8a">趋势早期</text>
  <text x="505" y="42" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="16" font-weight="700" fill="#a8453a">趋势末期</text>

  <!-- 左:多因素汇入价格 -->
  <g font-family="system-ui,sans-serif" font-size="12.5" fill="#33404f">
    <text x="60" y="96">需求</text>
    <text x="60" y="146">订单</text>
    <text x="60" y="196">利润</text>
    <text x="60" y="246">叙事</text>
  </g>
  <g stroke="#4f6b8a" stroke-width="2" fill="none">
    <path d="M98 91 C 160 100, 210 150, 258 176"/>
    <path d="M98 141 C 160 150, 210 165, 258 180"/>
    <path d="M98 191 C 160 190, 210 186, 258 184"/>
    <path d="M98 241 C 160 232, 210 200, 258 188"/>
  </g>
  <g fill="#4f6b8a"><circle cx="258" cy="176" r="2.5"/><circle cx="258" cy="180" r="2.5"/><circle cx="258" cy="184" r="2.5"/><circle cx="258" cy="188" r="2.5"/></g>
  <circle cx="278" cy="182" r="26" fill="#4f6b8a"/>
  <text x="278" y="187" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#fbf9f4">价格</text>
  <text x="175" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#6b6350">分布式计算:价格是算出来的结果</text>

  <!-- 右:价格自循环 -->
  <circle cx="505" cy="182" r="30" fill="#a8453a"/>
  <text x="505" y="187" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#fbf9f4">价格</text>
  <path d="M505 148 A 52 52 0 1 1 504 148" fill="none" stroke="#a8453a" stroke-width="2.4"/>
  <path d="M504 148 l-9 4 l6 8 z" fill="#a8453a"/>
  <text x="505" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#a8453a">上涨吸引上涨</text>
  <text x="505" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#6b6350">自我循环:只剩价格→价格一根箭</text>

  <text x="340" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#8a8170">越到末期,曲线越陡、人越亢奋,而系统算力越低——它已不在计算任何东西</text>
</svg>
